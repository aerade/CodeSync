name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Build AppImage
        run: pnpm --filter @workspace/desktop run build:full
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/desktop/dist/electron/CodeSync-*.AppImage

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Decode Windows certificate
        # Writes the base64-encoded .pfx stored in WIN_CSC_LINK to a temp file
        # so electron-builder can find it via the WIN_CSC_LINK env var.
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.WIN_CSC_LINK }}")
          $pfxPath  = Join-Path $env:RUNNER_TEMP "codesync-win.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          echo "WIN_CSC_LINK=$pfxPath" >> $env:GITHUB_ENV
      - name: Build Windows installer
        # WIN_CSC_LINK is already in the runner environment (set by previous step via GITHUB_ENV)
        run: pnpm --filter @workspace/desktop run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CERT_SUBJECT_NAME: ${{ secrets.WIN_CERT_SUBJECT_NAME }}
      - name: Upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/desktop/dist/electron/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - name: Import Apple Developer certificate into keychain
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
      - name: Build macOS DMG
        run: pnpm --filter @workspace/desktop run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # notarytool credentials
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/desktop/dist/electron/*.dmg
