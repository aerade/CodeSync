name: Certificate Expiry Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:      # Allow manual runs at any time

permissions:
  contents: read
  issues: write

jobs:
  check-certificates:
    runs-on: ubuntu-latest
    env:
      ALERT_DAYS: 60

    steps:
      # ------------------------------------------------------------------ #
      #  macOS — Apple Developer ID certificate (stored as base64 secret)   #
      #  Windows builds are currently unsigned (no certificate required)     #
      # ------------------------------------------------------------------ #
      - name: Check Apple Developer ID certificate expiry
        id: apple
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "apple_configured=false" >> "$GITHUB_OUTPUT"
            echo "apple_alert=false"      >> "$GITHUB_OUTPUT"
            echo "apple_reason=APPLE_CERTIFICATE_BASE64 not set — macOS builds are unsigned (Gatekeeper warning for users)." >> "$GITHUB_OUTPUT"
            echo "::notice::Apple certificate not configured — macOS builds will be unsigned."
            exit 0
          fi

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/apple_cert.p12

          EXPIRY_RAW=$(openssl pkcs12 \
            -in /tmp/apple_cert.p12 \
            -nokeys \
            -passin pass:"$APPLE_CERTIFICATE_PASSWORD" \
            -legacy 2>/dev/null \
          | openssl x509 -noout -enddate 2>/dev/null | head -1 | cut -d= -f2)

          rm -f /tmp/apple_cert.p12

          if [ -z "$EXPIRY_RAW" ]; then
            echo "apple_configured=false" >> "$GITHUB_OUTPUT"
            echo "apple_alert=true"       >> "$GITHUB_OUTPUT"
            echo "apple_reason=Could not parse Apple certificate — check APPLE_CERTIFICATE_PASSWORD or certificate format." >> "$GITHUB_OUTPUT"
            echo "::warning::Apple certificate could not be parsed."
            exit 0
          fi

          EXPIRY_EPOCH=$(date -d "$EXPIRY_RAW" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))

          echo "apple_configured=true"    >> "$GITHUB_OUTPUT"
          echo "apple_expiry=$EXPIRY_RAW" >> "$GITHUB_OUTPUT"
          echo "apple_days=$DAYS_LEFT"    >> "$GITHUB_OUTPUT"

          if [ "$DAYS_LEFT" -lt "$ALERT_DAYS" ]; then
            echo "apple_alert=true"  >> "$GITHUB_OUTPUT"
          else
            echo "apple_alert=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Apple certificate expires: $EXPIRY_RAW (${DAYS_LEFT} days remaining)"

      # ------------------------------------------------------------------ #
      #  Ensure the cert-expiry label exists before creating/searching issues#
      # ------------------------------------------------------------------ #
      - name: Ensure cert-expiry label exists
        if: steps.apple.outputs.apple_alert == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "cert-expiry" \
            --description "Code-signing certificate expiry alert" \
            --color "D93F0B" 2>/dev/null || true

      # ------------------------------------------------------------------ #
      #  Open or update a GitHub issue when Apple certificate is expiring   #
      # ------------------------------------------------------------------ #
      - name: Open GitHub issue if Apple certificate is expiring soon
        if: steps.apple.outputs.apple_alert == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.apple.outputs.apple_configured }}" = "true" ]; then
            BODY="## Certificate Expiry Alert

          The Apple Developer ID certificate is expiring soon.
          macOS builds will trigger Gatekeeper warnings once it expires.

          | Platform | Status | Expiry | Days remaining |
          |----------|--------|--------|----------------|
          | macOS (Apple Developer ID) | Expiring soon | ${{ steps.apple.outputs.apple_expiry }} | **${{ steps.apple.outputs.apple_days }}** |

          Renew the certificate and update the \`APPLE_CERTIFICATE_BASE64\` secret."
          else
            BODY="## Certificate Parse Error

          The Apple Developer ID certificate could not be parsed.

          **Reason:** ${{ steps.apple.outputs.apple_reason }}

          Check \`APPLE_CERTIFICATE_PASSWORD\` and the certificate format."
          fi

          EXISTING=$(gh issue list \
            --label "cert-expiry" \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue comment "$EXISTING" --body "$BODY" || echo "Warning: could not comment on issue #$EXISTING"
          else
            echo "Creating certificate expiry alert issue"
            gh issue create \
              --title "Apple certificate expiring in ${{ steps.apple.outputs.apple_days }} days — action required" \
              --body  "$BODY" \
              --label "cert-expiry" || echo "Warning: could not create issue"
          fi

      # ------------------------------------------------------------------ #
      #  Always write a human-readable summary to the Actions job summary    #
      # ------------------------------------------------------------------ #
      - name: Write job summary
        if: always()
        run: |
          echo "### Certificate Expiry Report" >> "$GITHUB_STEP_SUMMARY"
          echo ""                               >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | Configured | Expires | Days remaining | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------------|---------|----------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.apple.outputs.apple_configured }}" = "true" ]; then
            APPLE_STATUS=":white_check_mark: OK"
            [ "${{ steps.apple.outputs.apple_alert }}" = "true" ] && APPLE_STATUS=":warning: EXPIRING SOON"
            echo "| macOS (Apple Developer ID) | Yes | ${{ steps.apple.outputs.apple_expiry }} | ${{ steps.apple.outputs.apple_days }} | $APPLE_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          else
            APPLE_REASON="${{ steps.apple.outputs.apple_reason }}"
            echo "| macOS (Apple Developer ID) | No | $APPLE_REASON | — | :information_source: Not configured |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "| Windows | — | Unsigned builds (no certificate) | — | :information_source: Intentional |" >> "$GITHUB_STEP_SUMMARY"
