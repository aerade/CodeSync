kind = "video"
previewPath = "/synkhron-promo/"
title = "СИНХРОН — Промо-ролик"
version = "1.0.0"
id = "artifacts/synkhron-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/synkhron-promo/" ]
localPort = 23871

[services.development]
run = "pnpm --filter @workspace/synkhron-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/synkhron-promo", "run", "build" ]
publicDir = "artifacts/synkhron-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23871"
BASE_PATH = "/synkhron-promo/"
