kind = "web"
previewPath = "/desktop/"
title = "CodeSync Desktop"
version = "1.0.0"
id = "artifacts/desktop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/desktop/" ]
localPort = 21098

[services.development]
run = "pnpm --filter @workspace/desktop run dev:web"

[services.production]
build = [ "pnpm", "--filter", "@workspace/desktop", "run", "build:web" ]
publicDir = "artifacts/desktop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21098"
BASE_PATH = "/desktop/"
