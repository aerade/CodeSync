appId: com.codesync.desktop
productName: CodeSync
copyright: Copyright 2025 CodeSync

extraMetadata:
  main: dist/electron-main/main.cjs

directories:
  buildResources: build
  output: dist/electron

files:
  - dist/public/**/*
  - dist/electron-main/**/*
  - package.json

# Include the pre-built embedded server and its native modules
extraResources:
  - from: server/dist/
    to: server/
    filter:
      - "**/*"

asar: true
npmRebuild: false

# macOS
mac:
  category: public.app-category.developer-tools
  # Code signing — identity resolved from the keychain on the CI runner.
  # Set APPLE_SIGNING_IDENTITY in CI to match your Developer ID certificate
  # Common Name, e.g. "Developer ID Application: Your Name (TEAMID)".
  identity: ${APPLE_SIGNING_IDENTITY}
  # Hardened runtime is required for notarization.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization via notarytool (requires Xcode 13+).
  # Credentials are read from the environment variables listed below.
  notarize:
    teamId: ${APPLE_TEAM_ID}
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  sign: null
  signingHashAlgorithms: null
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CodeSync

# Linux
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]

publish:
  provider: github
  owner: your-org
  repo: codesync
