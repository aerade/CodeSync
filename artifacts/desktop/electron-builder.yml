appId: com.codesync.desktop
productName: CodeSync
copyright: Copyright 2025 CodeSync

# Override package.json fields in the packaged app
extraMetadata:
  main: dist/electron-main/main.cjs

# Build resources (icons) and output directory
directories:
  buildResources: build
  output: dist/electron

# Files to include in the packaged app
files:
  - dist/public/**/*
  - dist/electron-main/**/*
  - node_modules/**/*
  - "!node_modules/**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!node_modules/**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,cscope.out}"
  - "!node_modules/.bin"

# macOS
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# Auto-update (optional — configure owner/repo for GitHub Releases)
publish:
  provider: github
  owner: your-org
  repo: codesync
