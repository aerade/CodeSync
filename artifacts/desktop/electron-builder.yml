appId: com.codesync.desktop
productName: CodeSync
copyright: Copyright 2025 CodeSync

extraMetadata:
  main: dist/electron-main/main.cjs

directories:
  buildResources: build
  output: dist/electron

files:
  - dist/public/**/*
  - dist/electron-main/**/*
  - package.json

# Include the pre-built embedded server and its native modules
extraResources:
  - from: server/dist/
    to: server/
    filter:
      - "**/*"

asar: true
npmRebuild: false

# macOS
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

publish:
  provider: github
  owner: your-org
  repo: codesync
