appId: com.codesync.desktop
productName: CodeSync
copyright: Copyright 2025 CodeSync

# Set main entry in the packaged app's package.json
extraMetadata:
  main: dist/electron-main/main.cjs

# Build resources (icons) and output directory
directories:
  buildResources: build
  output: dist/electron

# The renderer is a pre-built Vite bundle — only ship the compiled assets and
# the compiled Electron main/preload. Do NOT ship node_modules (pnpm hoisting
# causes path resolution errors with electron-builder's traversal).
files:
  - dist/public/**/*
  - dist/electron-main/**/*
  - package.json

# Electron itself is bundled by electron-builder; no native deps to rebuild.
asar: true

# Skip native module rebuild — the main process has no native Node.js addons.
# This avoids traversal of pnpm-hoisted node_modules (which causes ENOENT
# errors for hoisted Replit-internal packages).
npmRebuild: false

# macOS
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# Auto-update (configure owner/repo for GitHub Releases)
publish:
  provider: github
  owner: your-org
  repo: codesync
