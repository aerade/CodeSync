appId: com.codesync.desktop
productName: CodeSync Desktop
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
copyright: Copyright © 2026 CodeSync

directories:
  output: dist/electron
  buildResources: build

files:
  - dist-electron/**/*
  - dist/public/**/*
  - package.json
  - "!node_modules/**/*.{md,markdown,ts,map}"
  - "!**/{.DS_Store,.git,.github,.gitignore,.vscode,test,tests,__tests__}"

publish: null

asar: true
asarUnpack:
  - "**/node_modules/better-sqlite3/**/*"
  - "**/node_modules/node-pty/**/*"

icon: assets/icon.png

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.png
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  icon: assets/icon.ico
  signingHashAlgorithms:
    - sha256
  signDlls: false
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  include: installer.nsh
  license: assets/license.txt
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CodeSync
  displayLanguageSelector: false
  installerLanguages:
    - en_US
  differentialPackage: false

extraResources:
  - from: assets/tos.txt
    to: tos.txt
  - from: assets/privacy.txt
    to: privacy.txt
